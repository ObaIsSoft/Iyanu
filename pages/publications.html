<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publications | Iyanuoluwa Adenle</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="app"></div>

    <main style="padding-top: calc(var(--space-xl) * 1.5);">
        <section class="section container">
            <h1 class="hero-title">Publications.</h1>

            <div id="poems" class="mt-lg">
                <h2 class="section-title">Poems</h2>
                <div class="project-grid mt-lg">
                    <a href="https://lolwe.org" target="_blank" class="project-card">
                        <div class="project-image"
                            style="background-image: url('https://images.unsplash.com/photo-1476287877209-4afdb1680572?q=80&w=600&auto=format&fit=crop');">
                        </div>
                        <div class="project-meta">
                            <h3 class="project-title">The Colour of Grief</h3>
                            <p class="text-accent">Lolwe</p>
                        </div>
                    </a>
                </div>
            </div>

            <div id="fiction" class="mt-lg" style="padding-top: var(--space-xl);">
                <h2 class="section-title">Fiction</h2>
                <p class="text-accent mb-lg">Available Soon</p>
            </div>

            <div id="essays" class="mt-lg" style="padding-top: var(--space-xl);">
                <h2 class="section-title">Essays</h2>
                <div class="project-grid mt-lg reverse">
                    <a href="#" class="project-card">
                        <div class="project-image"
                            style="background-image: url('https://images.unsplash.com/photo-1455390582262-044cdead2708?q=80&w=600&auto=format&fit=crop');">
                        </div>
                        <div class="project-meta">
                            <h3 class="project-title">Nostalgia is a Kind of Mercy</h3>
                            <p class="text-accent">Tender Photo / Chestnut Review</p>
                        </div>
                    </a>
                </div>
            </div>

            <div id="art-writing" class="mt-lg" style="padding-top: var(--space-xl);">
                <h2 class="section-title">Art Writing</h2>
                <div class="project-grid mt-lg">
                    <a href="https://nataal.com/iyanuoluwa-adenle" target="_blank" class="project-card staggered">
                        <div class="project-image"
                            style="background-image: url('https://images.unsplash.com/photo-1544816155-12df9643f363?q=80&w=600&auto=format&fit=crop');">
                        </div>
                        <div class="project-meta">
                            <h3 class="project-title">Imagining Otherwise</h3>
                            <p class="text-accent">NATAAL Media</p>
                        </div>
                    </a>
                </div>
            </div>

        </section>
    </main>

    <script type="module" src="/main.js"></script>
</body>

</html>
