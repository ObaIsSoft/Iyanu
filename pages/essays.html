<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Essays | Iyanuoluwa Adenle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="app"></div>

    <main style="padding-top: calc(var(--space-xl) * 1.5);">
        <section class="section container">
            <h1 class="hero-title">Essays.</h1>

            <div class="pub-list">

                <div class="pub-year-group">
                    <p class="pub-year">2023</p>
                    <a href="#" class="pub-entry">
                        <span class="pub-title">"Nostalgia is a kind of mercy"</span>
                        <span class="pub-venue">Tender Photo</span>
                    </a>
                </div>

                <div class="pub-year-group">
                    <p class="pub-year">2020</p>
                    <a href="#" class="pub-entry">
                        <span class="pub-title">"The colour of grief"</span>
                        <span class="pub-venue">Lolwe</span>
                    </a>
                </div>

                <!-- Skeleton slots — awaiting content -->
                <div class="pub-year-group pub-skeleton-group">
                    <p class="pub-year">— — — —</p>
                    <div class="pub-entry pub-skeleton">
                        <span class="pub-title skeleton-line" style="width: 55%;"></span>
                        <span class="pub-venue skeleton-line" style="width: 18%;"></span>
                    </div>
                    <div class="pub-entry pub-skeleton">
                        <span class="pub-title skeleton-line" style="width: 42%;"></span>
                        <span class="pub-venue skeleton-line" style="width: 22%;"></span>
                    </div>
                    <div class="pub-entry pub-skeleton">
                        <span class="pub-title skeleton-line" style="width: 60%;"></span>
                        <span class="pub-venue skeleton-line" style="width: 15%;"></span>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script type="module" src="/main.js"></script>
</body>

</html>
