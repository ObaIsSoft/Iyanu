<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Press | Iyanuoluwa Adenle</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="app"></div>

    <main style="padding-top: calc(var(--space-xl) * 1.5);">
        <section class="section container">
            <h1 class="hero-title">Press.</h1>

            <div id="features" class="mt-lg">
                <h2 class="section-title">Features</h2>
                <div class="press-list mt-lg">
                    <a href="#" class="press-item">
                        <span class="text-accent">Feature</span>
                        <h4 class="press-title">The Stack Journal</h4>
                    </a>
                </div>
            </div>

            <div id="interviews" class="mt-lg" style="padding-top: var(--space-xl);">
                <h2 class="section-title">Interviews</h2>
                <div class="press-list mt-lg">
                    <a href="#" class="press-item">
                        <span class="text-accent">Interview</span>
                        <h4 class="press-title">Brittle Paper Spotlight</h4>
                    </a>
                </div>
            </div>

            <div id="videos" class="mt-lg" style="padding-top: var(--space-xl);">
                <h2 class="section-title">Videos</h2>
                <div class="press-list mt-lg">
                    <a href="#" class="press-item">
                        <span class="text-accent">Video</span>
                        <h4 class="press-title">Poets from Versus Versus (Vimeo)</h4>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/main.js"></script>
</body>

</html>
